# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  build:
    desc: 清理 + 打包所有平台（Chrome、Edge）
    cmds:
      - rm -rf dist
      - echo "📦 正在打包 Chrome 扩展..."
      - pnpm zip
      - echo "📦 正在打包 Edge 扩展..."
      - pnpm zip -b edge
      - echo "✅ 打包完成！"
    silent: true

  publish:
    desc: 清理 + 打包 + 发布到 Chrome 和 Edge 商店
    cmds:
      - rm -rf dist
      - pnpm zip
      - pnpm zip -b edge
      - echo "🚀 正在发布到 Chrome 和 Edge 商店..."
      - pnpm wxt submit
        --chrome-zip dist/snaplab-*-chrome.zip
        --edge-zip dist/snaplab-*-edge.zip
      - echo "✅ 发布完成！"
    silent: true

  publish:chrome:
    desc: 清理 + 打包 + 发布到 Chrome 商店
    cmds:
      - rm -rf dist
      - pnpm zip
      - echo "🚀 正在发布到 Chrome 商店..."
      - pnpm wxt submit
        --chrome-zip dist/snaplab-*-chrome.zip
      - echo "✅ Chrome 发布完成！"
    silent: true

  publish:edge:
    desc: 清理 + 打包 + 发布到 Edge 商店
    cmds:
      - rm -rf dist
      - pnpm zip -b edge
      - echo "🚀 正在发布到 Edge 商店..."
      - pnpm wxt submit
        --edge-zip dist/snaplab-*-edge.zip
      - echo "✅ Edge 发布完成！"
    silent: true
