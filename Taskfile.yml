# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  build:
    desc: 清理 + 打包所有平台（Chrome、Edge）
    cmds:
      - task: _clean
      - echo "📦 正在打包 Chrome 扩展..."
      - pnpm zip
      - echo "📦 正在打包 Edge 扩展..."
      - pnpm zip -b edge
      - echo "✅ 打包完成！"
    silent: true

  publish:
    desc: 清理 + 打包 + 发布到 Chrome 和 Edge 商店
    cmds:
      - echo "🚀 开始发布流程..."
      - task: build
      - task: _submit
      - echo "✅ 发布完成！"
    silent: true

  # ---- 内部任务，不会出现在 task --list 中 ----

  _clean:
    internal: true
    cmds:
      - echo "🧹 清理 dist 目录..."
      - rm -rf dist
    silent: true

  _submit:
    internal: true
    cmds:
      - pnpm wxt submit
        --chrome-zip dist/snaplab-*-chrome.zip
        --edge-zip dist/snaplab-*-edge.zip
    silent: true
